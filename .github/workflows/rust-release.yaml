name: Rust Release

permissions: write-all

on:
  workflow_run:
    workflows: ["Semantic Versioning"]
    types:
      - completed
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, review_requested]
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-

    # Now let's actually do our pipeline.
    # Grab all the rust dependencies.
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
    - name: Cargo Install Packages
      run: cargo install cargo-edit cargo-tarpaulin
    
    - name: Set Cargo Version
      run: |
        git status
        git fetch --tags
        TAG_NAME=$(git tag --sort=-creatordate | head -n 1 | sed 's/[^0-9.]//g')
        echo "Version '$TAG_NAME'"
        if [ -n "$TAG_NAME" ]; then
          echo "Found tag: '$TAG_NAME' - setting version..."
          cargo set-version ${TAG_NAME}
        else
          echo "No tags found, no version was set."
        fi

    - name: Run Code Coverage
      env:
        RUSTFLAGS: "--deny warnings"
      run: cargo tarpaulin --out lcov --fail-immediately --release --fail-under 50 --force-clean --engine llvm

    - name: Upload Code Coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: lcov.info
        overwrite: true
        if-no-files-found: error
      
    - name: Build in release mode
      env:
        RUSTFLAGS: "--deny warnings"
      run: cargo build --release 
  publish:
    if: contains(github.ref_type, 'tag') || contains(github.event_name, 'workflow_run')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
    - name: Cargo Install Packages
      run: 
        cargo install cargo-edit
    
    - name: Set Cargo Version
      run: |
        git status
        git fetch --tags
        TAG_NAME=$(git tag --sort=-creatordate | head -n 1 | sed 's/[^0-9.]//g')
        echo "Version '$TAG_NAME'"
        if [ -n "$TAG_NAME" ]; then
          echo "Found tag: `$TAG_NAME` - setting version..."
          cargo set-version ${TAG_NAME}
        else
          echo "No tags found, no version was set."
        fi

    - name: Publish to crates.io
      env:
        CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      run: cargo publish --token $CRATES_IO_TOKEN --allow-dirty